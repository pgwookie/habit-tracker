{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Delete habit" %}{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body p-4">
    <h1 class="h5 mb-3">{% trans "Delete habit" %}</h1>
    <p class="text-muted">
      {% trans "Are you sure you want to delete:" %} <b>{{ habit.title }}</b>?
    </p>

    <form method="post" class="d-flex gap-2 justify-content-end">
      {% csrf_token %}
      <a class="btn btn-outline-secondary" href="{% url 'habit_detail' habit.pk %}">{% trans "Cancel" %}</a>
      <button class="btn btn-danger">{% trans "Delete" %}</button>
    </form>
  </div>
</div>
{% endblock %}
